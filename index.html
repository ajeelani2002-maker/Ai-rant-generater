<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 AI Rant Generator</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #38bdf8; }

.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    max-width: 420px;
    margin: auto;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.rant {
    background: #020617;
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    text-align: left;
    white-space: pre-line;
    position: relative;
}

.copy-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    background: #22c55e;
    padding: 5px 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<h1>🔥 AI Rant Generator</h1>

<div class="box">
    <input id="topic" placeholder="Topic (e.g. school, success)">
    <input id="length" type="number" placeholder="Length (seconds)">
    <input id="count" type="number" placeholder="Number of rants">

    <select id="tone">
        <option value="angry">Angry 😡</option>
        <option value="motivational">Motivational 💪</option>
        <option value="funny">Funny 😂</option>
    </select>

    <button onclick="generate()">Generate 🔥</button>
</div>

<div id="output"></div>

<script>
function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
    let topic = document.getElementById("topic").value || "this";
    let length = document.getElementById("length").value || 30;
    let count = document.getElementById("count").value || 1;
    let tone = document.getElementById("tone").value;

    let output = document.getElementById("output");
    output.innerHTML = "";

    let hooks = [
        "Nobody wants to admit this about " + topic + "...",
        "This might hurt, but " + topic + " is broken.",
        "Let me be real about " + topic + " for a second.",
        "Why is no one talking about " + topic + "?",
        "I’m done staying quiet about " + topic + "."
    ];

    let angry = [
        "People keep doing the same dumb things over and over.",
        "Everyone is just copying each other like robots.",
        "This is exactly why nobody improves.",
        "You’re wasting time and pretending you’re not.",
        "This mindset is destroying your future."
    ];

    let motivational = [
        "You have more potential than you think.",
        "Most people quit way too early.",
        "Consistency beats talent every single time.",
        "You’re one decision away from changing everything.",
        "Discipline is what separates winners from losers."
    ];

    let funny = [
        "Honestly, this makes zero sense 😂",
        "Like bro… what are we even doing here?",
        "This feels like a bad movie plot.",
        "I can’t even take this seriously anymore.",
        "At this point it’s just comedy."
    ];

    let endings = [
        "Think about that.",
        "Fix it.",
        "Do better.",
        "This is your sign.",
        "Now it’s your move."
    ];

    let toneSet = tone === "angry" ? angry : tone === "motivational" ? motivational : funny;

    for (let i = 0; i < count; i++) {

        let lines = [];
        lines.push(pick(hooks));

        let repeat = Math.max(3, Math.floor(length / 10));

        for (let j = 0; j < repeat; j++) {
            lines.push(pick(toneSet));
        }

        lines.push(pick(endings));

        let rantText = lines.join("\n\n");

        let div = document.createElement("div");
        div.className = "rant";

        let btn = document.createElement("button");
        btn.innerText = "Copy";
        btn.className = "copy-btn";
        btn.onclick = () => navigator.clipboard.writeText(rantText);

        div.innerText = rantText;
        div.appendChild(btn);

        output.appendChild(div);
    }
}
</script>

</body>
</html>
